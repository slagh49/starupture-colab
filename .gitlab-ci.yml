stages:
  - build
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  DOCKER_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend

# ---------- BUILD ----------

build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - cd backend
    - mvn package -DskipTests -q
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 1 hour
  only:
    refs:
      - main
      - develop

build-frontend:
  stage: build
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  only:
    refs:
      - main
      - develop

# ---------- PACKAGE ----------

package-backend:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: build-backend
      artifacts: true
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE_BACKEND:latest backend/
    - docker push $DOCKER_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE_BACKEND:latest
  only:
    refs:
      - main
      - develop

package-frontend:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: build-frontend
      artifacts: true
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA -t $DOCKER_IMAGE_FRONTEND:latest frontend/
    - docker push $DOCKER_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE_FRONTEND:latest
  only:
    refs:
      - main
      - develop

# ---------- DEPLOY ----------

deploy-staging:
  stage: deploy
  image: alpine:latest
  needs:
    - package-backend
    - package-frontend
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export DOCKER_IMAGE_BACKEND=$DOCKER_IMAGE_BACKEND &&
        export DOCKER_IMAGE_FRONTEND=$DOCKER_IMAGE_FRONTEND &&
        export DB_PASSWORD=$DB_PASSWORD &&
        docker compose -f docker-compose.yml -f docker-compose.staging.yml pull &&
        docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
      "
  environment:
    name: staging
    url: http://192.168.1.50:8081
  only:
    - develop

deploy-prod:
  stage: deploy
  image: alpine:latest
  needs:
    - package-backend
    - package-frontend
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export DOCKER_IMAGE_BACKEND=$DOCKER_IMAGE_BACKEND &&
        export DOCKER_IMAGE_FRONTEND=$DOCKER_IMAGE_FRONTEND &&
        export DB_PASSWORD=$DB_PASSWORD &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  environment:
    name: production
    url: http://192.168.1.50:8888
  only:
    - main
  when: manual
