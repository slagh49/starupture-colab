worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    gzip        on;
    gzip_types  text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # API proxy vers Spring Boot
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Upload .sav jusqu'a 50MB
            client_max_body_size 50m;

            # Le parsing d'une grosse sauvegarde (dizaines de milliers d'entités,
            # insérées une par une) peut dépasser le défaut nginx de 60s, ce qui
            # coupait l'upload/import par un 504. On laisse jusqu'à 10 min.
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
