services:
  nginx:
    image: ${DOCKER_IMAGE_FRONTEND:-starrupture/frontend}:latest
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${DOCKER_IMAGE_BACKEND:-starrupture/backend}:latest
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/starrupture?reWriteBatchedInserts=true
      DB_USER: scanner
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      # Secret HMAC obligatoire (le backend refuse de démarrer s'il est absent).
      APP_AUTH_SECRET: ${APP_AUTH_SECRET}
      # Parser un .sav volumineux (JSON ~240 Mo → arbre Jackson ~2 Go) dépasse la
      # heap par défaut (25% de la RAM). On la fixe pour éviter le thrash GC.
      JAVA_TOOL_OPTIONS: "-Xmx4g"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: starrupture
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "scanner", "-d", "starrupture"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
