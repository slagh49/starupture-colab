spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/starrupture
    username: scanner
    password: scanner
  jpa:
    show-sql: true
  data.redis:
    host: localhost
    port: 6379

app:
  auth:
    # Secret de DÉVELOPPEMENT uniquement (profil dev). En prod, APP_AUTH_SECRET est requis.
    secret: dev-only-insecure-hmac-secret

logging:
  level:
    com.starrupture: TRACE
    org.hibernate.SQL: DEBUG
