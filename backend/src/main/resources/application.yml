spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/starrupture?reWriteBatchedInserts=true}
    username: ${DB_USER:scanner}
    password: ${DB_PASSWORD:scanner}
  jpa:
    hibernate.ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  data.redis:
    host: ${REDIS_HOST:redis}
    port: 6379
  servlet.multipart:
    max-file-size: 50MB
    max-request-size: 50MB

app:
  auth:
    # HMAC signing secret for auth tokens. REQUIRED — must be provided via APP_AUTH_SECRET.
    # No default on purpose: a shared default would let anyone forge valid tokens.
    # Generate one with e.g. `openssl rand -base64 48`.
    secret: ${APP_AUTH_SECRET:}
    token-ttl-hours: 168
    # Default admin seeded on first start if no users exist.
    default-admin-user: ${APP_ADMIN_USER:admin}
    default-admin-password: ${APP_ADMIN_PASSWORD:admin}

server:
  port: 8080

logging:
  level:
    com.starrupture: DEBUG
